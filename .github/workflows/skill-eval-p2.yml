name: Skill Behavior Eval (P2)

# Full end-to-end behavior evaluation for the TRTC skill.
# Not gated on PRs — costs LLM tokens and takes 15–90 minutes.
#
# Triggers:
#   - workflow_dispatch: manual, with knobs for IDE and tag filter
#   - schedule: every Monday 03:00 UTC (baseline drift watch)
#
# Currently supports claude-code + codex only. Cursor / CodeBuddy CI
# auth is untested — see skill-ci-probe.yml for exploratory runs.

on:
  workflow_dispatch:
    inputs:
      ide:
        description: 'IDE to evaluate'
        required: true
        default: 'claude-code'
        type: choice
        options:
          - claude-code
          - codex
          - both
      tags:
        description: 'Case tag filter (e.g. smoke). Blank = all.'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 3 * * 1'

env:
  NPX_TARGET: '@tencent-rtc/trtc-agent-skills@latest'

jobs:
  eval:
    name: eval (${{ matrix.ide }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        ide: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.ide == 'claude-code' && fromJSON('["claude-code"]'))
            || (github.event_name == 'workflow_dispatch' && inputs.ide == 'codex' && fromJSON('["codex"]'))
            || fromJSON('["claude-code","codex"]')
          }}

    steps:
      - name: Checkout eval scripts
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install skill via npx
        run: |
          mkdir -p /tmp/install-target
          cd /tmp/install-target
          npx -y "$NPX_TARGET" add --ide all --no-report

      - name: Install claude-code CLI
        if: matrix.ide == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install codex CLI
        if: matrix.ide == 'codex'
        run: npm install -g @openai/codex

      - name: Verify CLI available
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          case "${{ matrix.ide }}" in
            claude-code) command -v claude && claude --version ;;
            codex)       command -v codex  && codex --version ;;
          esac

      - name: Probe event stream (sanity check, ~30s)
        working-directory: /tmp/install-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 "$GITHUB_WORKSPACE/run_eval.py" \
            --ide "${{ matrix.ide }}" \
            --working-dir /tmp/install-target \
            --cases "$GITHUB_WORKSPACE/cases.json" \
            --probe

      - name: Run P2 eval
        working-directory: /tmp/install-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TAGS_ARG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_ARG="--tags ${{ inputs.tags }}"
          fi
          python3 "$GITHUB_WORKSPACE/run_eval.py" \
            --ide "${{ matrix.ide }}" \
            --working-dir /tmp/install-target \
            --cases "$GITHUB_WORKSPACE/cases.json" \
            --out-dir "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}" \
            $TAGS_ARG

      - name: Score
        run: |
          python3 score.py \
            "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}/results.${{ matrix.ide }}.yaml" \
            --cases cases.json \
            --out-dir "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ matrix.ide }}-${{ github.run_id }}
          path: eval-runs/${{ github.run_id }}/
          retention-days: 30
