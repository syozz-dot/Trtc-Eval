name: Skill Behavior Eval (P2)

# End-to-end behavior evaluation for the TRTC skill.
# Tests skill loading, routing, hooks, tool calls — NOT model quality.
# Uses cheap models by default (haiku / gpt-4o-mini) to keep cost minimal.
#
# Triggers:
#   - workflow_dispatch: manual, with knobs for IDE / tags / model
#   - schedule: every Monday 03:00 UTC (baseline drift watch)
#
# Cost estimate per full run (10 cases):
#   - Claude Haiku 4.5:  ~$0.20
#   - GPT-4o-mini:       ~$0.02
# Set $5/month spend limit at:
#   Anthropic: https://console.anthropic.com/settings/limits
#   OpenAI:    https://platform.openai.com/settings/organization/limits

on:
  workflow_dispatch:
    inputs:
      ide:
        description: 'IDE to evaluate'
        required: true
        default: 'both'
        type: choice
        options:
          - claude-code
          - codex
          - both
      tags:
        description: 'Case tag filter (e.g. smoke for 2 quick FAQ cases). Blank = all 10.'
        required: false
        default: ''
        type: string
      claude_model:
        description: 'Model for claude-code (default haiku-4.5)'
        required: false
        default: 'claude-haiku-4-5'
        type: string
      codex_model:
        description: 'Model for codex (default gpt-4o-mini)'
        required: false
        default: 'gpt-4o-mini'
        type: string
  schedule:
    - cron: '0 3 * * 1'

env:
  NPX_TARGET: '@tencent-rtc/trtc-agent-skills@latest'
  # Defaults used when scheduled (no inputs). Change here to steer cron runs.
  DEFAULT_CLAUDE_MODEL: 'claude-haiku-4-5'
  DEFAULT_CODEX_MODEL: 'gpt-4o-mini'

jobs:
  eval:
    name: eval (${{ matrix.ide }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        ide: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.ide == 'claude-code' && fromJSON('["claude-code"]'))
            || (github.event_name == 'workflow_dispatch' && inputs.ide == 'codex' && fromJSON('["codex"]'))
            || fromJSON('["claude-code","codex"]')
          }}

    steps:
      - name: Checkout eval scripts
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install skill via npx
        run: |
          mkdir -p /tmp/install-target
          cd /tmp/install-target
          npx -y "$NPX_TARGET" add --ide all --no-report

      - name: Install claude-code CLI
        if: matrix.ide == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install codex CLI
        if: matrix.ide == 'codex'
        run: npm install -g @openai/codex

      - name: Verify CLI available
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          case "${{ matrix.ide }}" in
            claude-code) command -v claude && claude --version ;;
            codex)       command -v codex  && codex --version ;;
          esac

      - name: Resolve model for this IDE
        id: model
        run: |
          case "${{ matrix.ide }}" in
            claude-code)
              MODEL="${{ inputs.claude_model }}"
              [ -z "$MODEL" ] && MODEL="$DEFAULT_CLAUDE_MODEL"
              ;;
            codex)
              MODEL="${{ inputs.codex_model }}"
              [ -z "$MODEL" ] && MODEL="$DEFAULT_CODEX_MODEL"
              ;;
          esac
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "Using model: $MODEL"

      - name: Probe event stream (sanity check, ~30s)
        working-directory: /tmp/install-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 "$GITHUB_WORKSPACE/run_eval.py" \
            --ide "${{ matrix.ide }}" \
            --working-dir /tmp/install-target \
            --cases "$GITHUB_WORKSPACE/cases.json" \
            --probe \
            --probe-model "${{ steps.model.outputs.model }}"

      - name: Run P2 eval
        working-directory: /tmp/install-target
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TAGS_ARG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_ARG="--tags ${{ inputs.tags }}"
          fi
          python3 "$GITHUB_WORKSPACE/run_eval.py" \
            --ide "${{ matrix.ide }}" \
            --working-dir /tmp/install-target \
            --cases "$GITHUB_WORKSPACE/cases.json" \
            --out-dir "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}" \
            --model "${{ steps.model.outputs.model }}" \
            $TAGS_ARG

      - name: Score
        run: |
          python3 score.py \
            "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}/results.${{ matrix.ide }}.yaml" \
            --cases cases.json \
            --out-dir "$GITHUB_WORKSPACE/eval-runs/${{ github.run_id }}"

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-${{ matrix.ide }}-${{ github.run_id }}
          path: eval-runs/${{ github.run_id }}/
          retention-days: 30
