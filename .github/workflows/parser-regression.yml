name: Parser Regression + Secret Scan

# Runs on every PR and push to main.
#
# Two guards, both zero-cost and no API key needed:
#
#   1. Parser fixture regression: replays 8 golden stream-json transcripts
#      (claude-code / cursor / codex / codebuddy × 2 smoke cases) through
#      run_eval.py's parsers + judges and asserts every observation returns Y.
#      Catches parser-dialect regressions (like the cursor false-negative
#      shipped on 2026-07-08) before they can silently break scoring.
#
#   2. Sensitive-info scan: checks the tree for API keys, OAuth tokens, and
#      PII patterns. Second line of defence after the local pre-commit hook
#      (install with scripts/install-hooks.sh).
#
# Both are hard gates for PR merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  parser-regression:
    name: Parser fixture regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run regression
        id: reg
        run: |
          set +e
          python3 tests/test_parser_regression.py 2>&1 | tee /tmp/reg.log
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit $rc
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Parser Regression"
            if [ "${{ steps.reg.outputs.rc }}" = "0" ]; then
              echo ""
              echo "✅ All 8 golden fixtures re-parsed and judged **all Y**."
            else
              echo ""
              echo "❌ Fixture regression FAILED. Full log:"
              echo ""
              echo '```'
              cat /tmp/reg.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    name: Sensitive info scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Scan tree
        id: scan
        run: |
          set +e
          python3 scripts/scan_sensitive.py 2>&1 | tee /tmp/scan.log
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit $rc
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Sensitive Info Scan"
            if [ "${{ steps.scan.outputs.rc }}" = "0" ]; then
              echo ""
              echo "✅ No API keys, OAuth tokens, or PII patterns matched."
            else
              echo ""
              echo "❌ Sensitive info detected. See details:"
              echo ""
              echo '```'
              cat /tmp/scan.log
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
