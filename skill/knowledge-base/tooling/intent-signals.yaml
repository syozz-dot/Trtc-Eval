# intent-signals.yaml
# capability 查询的二级意图分类信号词
#
# detect_capability_intent() 用这两张表把 capability 查询分成：
#   integrate  — 用户想在自己的项目里接入 / 构建功能（→ domain skill onboarding）
#   lookup     — 用户想了解功能 / 查阅文档（→ trtc-docs）
#   ambiguous  — 两类信号同时出现或都没有（→ dispatcher 主动问用户）
#
# 匹配方式：substring，在 _normalize_query() 归一化后的字符串上做。
# 原则：
#   - 只收"强信号"——能独立判定意图的短语，避免高频通用词误判。
#   - 中文优先收完整词组（接入 / 是什么），不收单字（做 / 用）。
#   - 每次新增前先问：这个词单独出现时意图是否还清晰？
#   - 文档/quickstart 这类词如果同时和接入动词连用，默认视为 integrate；单独出现仍归 lookup。

